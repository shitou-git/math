name: CI

on:
  push:
    branches: [main, module]
  pull_request:
    branches: [main, module]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chem-lab

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: chem-lab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    if: github.ref == 'refs/heads/module'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: chem-lab/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: chem-lab

      - name: Build
        run: npm run build
        working-directory: chem-lab

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/chem
          cp -r chem-lab/dist/* _site/chem/
          cp index.html _site/ 2>/dev/null || true
          cp -r modules _site/ 2>/dev/null || true
          cp -r assets _site/ 2>/dev/null || true
          cp xue*.png _site/ 2>/dev/null || true
          cp xue*.webp _site/ 2>/dev/null || true
          cp Z.webp _site/ 2>/dev/null || true
          cp formulas.json _site/ 2>/dev/null || true
          cp problems.json _site/ 2>/dev/null || true
          cp manifest.json _site/ 2>/dev/null || true
          cp manifest-math.json _site/ 2>/dev/null || true
          cp .nojekyll _site/ 2>/dev/null || true
          cp yin.mp4 _site/ 2>/dev/null || true
          cp -r ipa-audio _site/ 2>/dev/null || true
          cp -r data _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
