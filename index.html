<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="icon" type="image/webp" href="xue-64.webp">
    <link rel="apple-touch-icon" href="xue-192.webp">
    <link rel="manifest" href="manifest-math.json">
    <title>快乐学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #faf5ff 0%, #fff7ed 50%, #fdf2f8 100%);
            min-height: 100vh;
            padding: 15px;
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* 首页样式 */
        .home-page {
            text-align: center;
            padding: 40px 15px;
        }

        .home-page h1 {
            color: #7c3aed;
            font-size: 48px;
            margin-bottom: 50px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            line-height: 1.3;
        }

        .game-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .game-card:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .game-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .game-card h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .game-card p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }

        /* 通用游戏页面样式 */
        .game-page {
            display: none;
            text-align: left;
        }

        .game-page.active {
            display: block;
        }

        .full-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            z-index: 1000;
            overflow-y: auto;
            display: none;
        }

        .full-page.active {
            display: block;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            color: #7c3aed;
            border: 2px solid #ede9fe;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.12);
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.2);
        }

        .gradient-header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899, #f59e0b);
            color: #fff;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 12px 32px rgba(139, 92, 246, 0.25);
        }

        .gradient-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.12);
        }

        .gradient-header p {
            font-size: 16px;
            opacity: 0.95;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .diff-btn {
            padding: 12px 30px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
            color: #475569;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .diff-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .diff-btn:hover:not(.active) {
            border-color: #667eea;
            color: #667eea;
            background: #f0f5ff;
        }

        .diff-btn:active {
            transform: translateY(1px);
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .action-btn:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
        }

        .action-btn.check {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }

        .action-btn.check:hover {
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        .action-btn.solve {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.3);
        }

        .action-btn.solve:hover {
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
        }

        .result-panel {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
        }

        .result-panel.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .result-panel.success {
            background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
            border: 2px solid #86efac;
        }

        .result-panel.error {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid #fca5a5;
        }

        .result-panel h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .result-panel.success h3 {
            color: #16a34a;
        }

        .result-panel.error h3 {
            color: #dc2626;
        }

        .result-panel p {
            font-size: 14px;
            color: #4b5563;
        }

        .game-rules {
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            color: #1a1a1a;
        }

        .game-rules h4 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #1a1a1a;
        }

        .game-rules p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        /* 响应式样式 - 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                font-size: 15px;
            }

            .home-page {
                padding: 30px 10px;
            }

            .home-page h1 {
                font-size: 32px;
                margin-bottom: 30px;
            }

            .game-card {
                padding: 25px 20px;
            }

            .game-icon {
                font-size: 48px;
            }

            .game-card h2 {
                font-size: 22px;
            }

            .game-card p {
                font-size: 14px;
            }

            .back-btn {
                padding: 8px 16px;
                font-size: 14px;
                margin-bottom: 15px;
            }

            .gradient-header {
                padding: 20px 15px;
            }

            .gradient-header h1 {
                font-size: 24px;
            }

            .gradient-header p {
                font-size: 14px;
            }

            .game-container {
                padding: 20px;
            }

            .difficulty-selector {
                gap: 10px;
                margin-bottom: 20px;
            }

            .diff-btn {
                padding: 10px 20px;
                font-size: 14px;
            }

            .action-btn {
                padding: 10px 20px;
                font-size: 14px;
            }

            .footer {
                padding: 15px;
                font-size: 12px;
            }
        }

        /* 小屏幕手机适配 */
        @media (max-width: 480px) {
            .home-page h1 {
                font-size: 26px;
                margin-bottom: 25px;
            }

            .game-cards {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .game-card {
                padding: 20px 15px;
            }

            .game-icon {
                font-size: 40px;
            }

            .game-card h2 {
                font-size: 20px;
            }

            .game-card p {
                font-size: 13px;
            }

            .gradient-header {
                padding: 15px 10px;
            }

            .gradient-header h1 {
                font-size: 20px;
            }

            .game-container {
                padding: 15px;
            }

            .diff-btn {
                padding: 8px 15px;
                font-size: 13px;
            }

            .action-btn {
                padding: 8px 15px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage" class="home-page">
            <h1>🎯 趣味学习</h1>
            <div class="game-cards">
                <div class="game-card" onclick="showGame('sudoku')">
                    <div class="game-icon">📊</div>
                    <h2>数独</h2>
                    <p>锻炼逻辑思维的经典数字游戏</p>
                </div>
                <div class="game-card" onclick="showGame('magic')">
                    <div class="game-icon">✨</div>
                    <h2>幻方</h2>
                    <p>每行每列对角线和相等的神奇方格</p>
                </div>
                <div class="game-card" onclick="showGame('arithmetic')">
                    <div class="game-icon">🧮</div>
                    <h2>巧算奥数</h2>
                    <p>四则运算练习 + 奥数思维拓展</p>
                </div>
                <div class="game-card" onclick="showGame('schulte')">
                    <div class="game-icon">🎯</div>
                    <h2>舒尔特方格</h2>
                    <p>练习注意力，提升专注力</p>
                </div>
                <div class="game-card" onclick="showGame('dc')">
                    <div class="game-icon">📚</div>
                    <h2>快乐学英语</h2>
                    <p>趣味英语学习乐园</p>
                </div>
                <div class="game-card" onclick="window.open('https://shitou-git.github.io/kepu', '_blank')">
                    <div class="game-icon">🔬</div>
                    <h2>少年科普</h2>
                    <p>探索科学世界，激发好奇心</p>
                </div>
            </div>
            <div style="text-align: center; margin-top: 30px;">
                <div style="display: inline-flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;" onclick="window.open('https://shitou-git.github.io/chat/index', '_blank')"><img src="Z.webp" style="width: 64px; height: 64px; border-radius: 10px;"><span style="font-size: 14px; font-weight: 600; color: #7c3aed;">灵知</span></div>
            </div>
            <div style="text-align: center; margin-top: 20px; color: #6b7280; font-size: 12px;">v1.2.0</div>
        </div>

        <!-- 游戏页面容器（由ES Module动态填充内容） -->
        <div id="magicPage" class="game-page"></div>
        <div id="arithmeticPage" class="game-page"></div>
        <div id="schultePage" class="game-page"></div>
        <div id="sudokuPage" class="game-page"></div>

        <!-- 已模块化的页面（由ES Module动态填充内容，全屏显示） -->
        <div id="dcPage" class="game-page full-page"></div>
        <div id="aoshuPage" class="game-page full-page"></div>
        <div id="siluPage" class="game-page full-page"></div>
    </div>

    <div class="footer">
        <p>@Stone | 锻炼逻辑思维的经典数字游戏</p>
    </div>

    <script type="module" src="modules/main.js"></script>
</body>
</html>
