<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="小学奥数解题思路公式速查手册 · 按题型梳理公式与解题四步法">
<meta name="theme-color" content="#8b5cf6">
<title>奥数解题思路 · 公式速查手册</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  :root {
    --c-primary: #7c3aed;
    --c-primary-soft: #ede9fe;
    --c-easy-soft: #d1fae5;
    --c-mid: #f59e0b;
    --c-mid-soft: #fef3c7;
    --c-text: #1f2937;
    --c-muted: #6b7280;
    --c-bg: linear-gradient(135deg, #faf5ff 0%, #fff7ed 50%, #fdf2f8 100%);
    --shadow: 0 6px 20px rgba(124, 58, 237, 0.12);
    --shadow-strong: 0 12px 32px rgba(139, 92, 246, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  :focus-visible { outline: 2px solid var(--c-primary); outline-offset: 2px; }
  a:focus-visible, button:focus-visible { outline-offset: 2px; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--c-bg);
    min-height: 100vh;
    color: var(--c-text);
    line-height: 1.75;
    padding: 20px;
    word-break: break-word;
    overflow-wrap: break-word;
    -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 1060px; margin: 0 auto; }

  /* ========== 标题区 ========== */
  .header {
    text-align: center;
    padding: 38px 24px 32px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899, #f59e0b);
    color: #fff;
    border-radius: 28px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-strong);
    position: relative; overflow: hidden;
  }
  .header h1 { font-size: 2.4rem; margin-bottom: 8px; letter-spacing: 3px; text-shadow: 2px 2px 0 rgba(0,0,0,0.12); position: relative; }
  .header p { font-size: 1.05rem; opacity: 0.95; letter-spacing: 1px; position: relative; }

  /* ========== 导航按钮 ========== */
  .topbar {
    display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; justify-content: flex-start;
  }
  .btn-back {
    padding: 10px 22px; background: #fff; color: var(--c-primary); border-radius: 999px;
    cursor: pointer; font-size: 0.95rem; font-weight: bold; box-shadow: var(--shadow);
    border: 2px solid var(--c-primary-soft); text-decoration: none; transition: transform 0.2s;
  }
  .btn-back:hover { transform: translateY(-2px); }

  /* ========== 分类目录 ========== */
  .cat-list {
    background: #fff; padding: 20px; border-radius: 22px;
    box-shadow: var(--shadow); margin-bottom: 24px;
  }
  .cat-list h2 {
    color: var(--c-primary); font-size: 1.25rem; margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 3px dashed var(--c-primary-soft);
  }
  .cat-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  .cat-link {
    display: block; padding: 10px 14px; background: var(--c-primary-soft);
    color: var(--c-primary); border-radius: 12px; text-decoration: none;
    font-size: 0.92rem; text-align: center; transition: all 0.2s;
    font-weight: 500;
  }
  .cat-link:hover { background: var(--c-primary); color: #fff; transform: translateY(-2px); }
  .cat-link .count { font-size: 0.78rem; opacity: 0.75; margin-left: 4px; }

  /* ========== 题型卡片（折叠式） ========== */
  .category {
    margin-bottom: 26px; scroll-margin-top: 20px;
    display: none;
  }
  .category.active {
    display: block;
  }
  .category-title {
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: #fff; padding: 14px 20px; border-radius: 18px;
    font-size: 1.25rem; margin-bottom: 12px; box-shadow: var(--shadow);
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none; transition: opacity 0.2s;
    gap: 10px;
  }
  .category-title:hover { opacity: 0.9; }
  .category-title .icon { font-size: 1.5rem; margin-right: 6px; flex-shrink: 0; }
  .category-title > span:first-child { flex: 1; min-width: 0; line-height: 1.5; }
  .category-title .note { font-size: 0.85rem; opacity: 0.9; font-weight: normal; display: inline; }
  .category-title .chevron { font-size: 1.2rem; transition: transform 0.3s; flex-shrink: 0; }
  .category-title.collapsed .chevron { transform: rotate(-90deg); }
  .category-title.collapsed { margin-bottom: 0; }

  .card {
    background: #fff; border-radius: 18px;
    box-shadow: var(--shadow); margin-bottom: 10px;
    border-left: 5px solid var(--c-primary);
    overflow: hidden;
  }
  .card:nth-child(3n+1) { border-left-color: #8b5cf6; }
  .card:nth-child(3n+2) { border-left-color: #ec4899; }
  .card:nth-child(3n+3) { border-left-color: #f59e0b; }

  /* 可折叠的卡片头部 */
  .card-header {
    padding: 13px 18px; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    transition: background 0.15s;
  }
  .card-header:hover { background: #f5f3ff; }
  .card-header .emoji { font-size: 1.3rem; flex-shrink: 0; }
  .card-header h3 {
    font-size: 1.05rem; color: var(--c-primary); flex: 1 1 180px;
    border: none; padding: 0; margin: 0; background: none;
    min-width: 0; line-height: 1.5;
  }
  .card-header .chevron {
    font-size: 1.1rem; color: var(--c-muted); flex-shrink: 0;
    transition: transform 0.3s;
  }
  .card.expanded .card-header .chevron { transform: rotate(180deg); }

  /* 卡片折叠状态 */
  .card-body {
    display: none;
    padding: 0 18px 16px;
    border-top: 1px dashed var(--c-primary-soft);
  }
  .card.expanded .card-body { display: block; }

  /* 公式区（全宽） */
  .formula {
    background: var(--c-primary-soft); padding: 8px 12px; border-radius: 10px;
    margin: 6px 0; font-family: "Courier New", monospace; font-size: 0.9rem;
    color: #5b21b6; font-weight: bold; white-space: pre-wrap; word-break: break-word;
    line-height: 1.4;
  }

  /* 提示+公式（左列）| 四步法（右列）两列 */
  .mid-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;
  }
  .formula-col { display: flex; flex-direction: column; gap: 8px; }

  .note-box {
    background: var(--c-mid-soft); padding: 10px 14px; border-radius: 10px;
    font-size: 0.9rem;
  }
  .note-box strong { color: var(--c-mid); display: block; margin-bottom: 4px; font-size: 0.82rem; }

  .steps {
    background: var(--c-easy-soft); padding: 10px 14px; border-radius: 10px;
  }
  .steps h4 { color: var(--c-easy); font-size: 0.95rem; margin-bottom: 6px; font-weight: bold; }
  .steps ol { margin: 0 0 0 18px; padding: 0; }
  .steps ol li { margin-bottom: 3px; font-size: 0.88rem; }

  /* 经典例题 两列 */
  .examples-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;
  }
  @media (max-width: 500px) {
    .examples-grid { grid-template-columns: 1fr; }
  }

  .example {
    background: #f9fafb; padding: 8px 12px; border-radius: 8px;
    font-size: 0.88rem; border-left: 3px solid #d1d5db;
  }
  .example-title { color: var(--c-muted); font-weight: bold; margin-bottom: 3px; font-size: 0.8rem; }

  .keywords {
    background: var(--c-mid-soft); padding: 4px 8px; border-radius: 999px;
    font-size: 0.78rem; color: var(--c-mid); font-weight: bold; flex: 1 1 100%;
    display: flex; flex-wrap: wrap; gap: 4px; line-height: 1.3;
  }
  .keywords .tag {
    display: inline-block; padding: 2px 8px; background: #fff; border-radius: 999px;
    margin: 0; font-size: 0.75rem; color: var(--c-mid); font-weight: bold;
    white-space: nowrap;
  }

  /* ========== 悬浮按钮 ========== */
  .float-btn {
    position: fixed; right: 20px; z-index: 100; cursor: pointer;
    background: #fff; border-radius: 14px; box-shadow: var(--shadow-strong);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: bold; font-size: 0.8rem; padding: 6px 4px;
    width: 44px; line-height: 1; gap: 2px;
    border: 2px solid var(--c-primary-soft);
    font-family: inherit; color: var(--c-primary);
  }
  .float-btn:hover { background: var(--c-primary-soft); }
  .float-btn-top { top: 24px; color: var(--c-primary); }
  .float-btn .arrow { font-size: 1.2rem; line-height: 1; }
  .float-btn .label-top, .float-btn .label-mid { font-size: 0.78rem; }
  @media (max-width: 600px) {
    body { padding: 12px; }
    .container { max-width: 100%; }

    .header { padding: 28px 16px 24px; }
    .header h1 { font-size: 1.4rem; letter-spacing: 1px; }
    .header p { font-size: 0.9rem; }

    .topbar { gap: 8px; margin-bottom: 12px; }
    .btn-back { padding: 8px 16px; font-size: 0.85rem; }

    /* 目录 */
    .cat-list { padding: 14px; }
    .cat-list h2 { font-size: 1.05rem; margin-bottom: 10px; }
    .cat-grid { gap: 6px; }
    .cat-link { font-size: 0.85rem; padding: 8px 10px; }
    .cat-link .count { font-size: 0.72rem; }

    /* 大类标题 */
    .category-title {
      padding: 12px 14px; font-size: 1.05rem; margin-bottom: 10px;
      border-radius: 14px;
    }
    .category-title .icon { font-size: 1.3rem; }
    .category-title .note { font-size: 0.78rem; display: block; margin-top: 3px; }
    .category-title .chevron { font-size: 1.1rem; }

    /* 卡片 */
    .card { margin-bottom: 8px; border-radius: 14px; border-left-width: 4px; }
    .card-header {
      padding: 12px 14px; gap: 8px;
    }
    .card-header .emoji { font-size: 1.15rem; }
    .card-header h3 { font-size: 0.98rem; flex: 1 1 100%; order: 2; }
    .card-header .chevron { font-size: 1rem; order: 3; }
    .card-header .keywords { order: 4; flex: 1 1 100%; font-size: 0.72rem; padding: 3px 6px; gap: 3px; }
    .card-header .keywords .tag { font-size: 0.7rem; padding: 2px 6px; }

    .card-body { padding: 0 14px 14px; }

    /* 提示+公式+四步法 两列改单列 */
    .mid-grid { grid-template-columns: 1fr; gap: 8px; margin-top: 8px; }
    .formula-col { gap: 6px; }

    .note-box { padding: 8px 12px; font-size: 0.85rem; }
    .note-box strong { font-size: 0.78rem; }

    .formula {
      padding: 6px 10px; font-size: 0.8rem; margin: 4px 0; line-height: 1.35;
      overflow-wrap: break-word;
    }

    .steps { padding: 8px 12px; }
    .steps h4 { font-size: 0.88rem; }
    .steps ol { margin-left: 16px; }
    .steps ol li { font-size: 0.83rem; }

    /* 例题两列改单列 */
    .examples-grid { grid-template-columns: 1fr; gap: 6px; margin-top: 8px; }
    .example { padding: 6px 10px; font-size: 0.83rem; }
    .example-title { font-size: 0.76rem; }

    /* 悬浮按钮 */
    .float-btn { right: 8px; width: 40px; padding: 5px 3px; font-size: 0.75rem; }
    .float-btn-top { top: 16px; }
    .float-btn .arrow { font-size: 1rem; }
    .float-btn .label-top, .float-btn .label-mid { font-size: 0.68rem; }

    /* 页脚 */
    .footer { font-size: 0.82rem; padding: 14px; }

    /* AI 聊天弹窗 */
    .chat-modal { width: 96%; max-height: 90vh; border-radius: 20px; }
    .chat-header { padding: 14px 16px; }
    .chat-header h2 { font-size: 1.05rem; }
    .chat-messages { padding: 14px; gap: 12px; }
    .msg-bubble { padding: 10px 14px; font-size: 0.9rem; max-width: 100%; }
    .chat-input-area { padding: 12px 14px; }
    .chat-input { padding: 10px 14px; font-size: 0.9rem; }
    .chat-send-btn { width: 40px; height: 40px; }
  }

  /* 超小屏幕（<380px）额外优化 */
  @media (max-width: 380px) {
    .header h1 { font-size: 1.2rem; }
    .category-title { font-size: 0.98rem; padding: 10px 12px; }
    .card-header h3 { font-size: 0.92rem; }
    .formula { font-size: 0.8rem; }
    .steps ol li { font-size: 0.78rem; }
    .example { font-size: 0.78rem; }
  }

  /* ========== 页脚 ========== */
  .footer {
    text-align: center; padding: 20px; color: var(--c-muted); font-size: 0.9rem;
    margin-top: 30px;
  }

  /* ========== AI 聊天弹窗 ========== */
  .chat-modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 1000;
    display: none; justify-content: center; align-items: center;
    backdrop-filter: blur(4px);
    overscroll-behavior: contain;
  }
  .chat-modal-overlay.show { display: flex; }
  body.chat-open { overflow: hidden; position: fixed; width: 100%; }
  .chat-modal {
    background: #fff; border-radius: 24px; width: 90%; max-width: 720px;
    height: 650px; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .chat-header {
    background: linear-gradient(135deg, #8b5cf6, #ec4899); color: #fff;
    padding: 18px 24px; display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .chat-header h2 { font-size: 1.2rem; font-weight: bold; }
  .chat-close {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    width: 32px; height: 32px; border-radius: 50%; font-size: 1.2rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .chat-close:hover { background: rgba(255,255,255,0.3); }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column;
    gap: 16px; background: #faf5ff; overscroll-behavior: contain; touch-action: pan-y;
    width: 100%;
    box-sizing: border-box;
  }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  .message { display: flex; gap: 0; max-width: 100%; width: 100%; }
  .message.user { justify-content: flex-end; }
  .message.ai { justify-content: flex-start; }
  .msg-bubble {
    padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.7;
    max-width: 100%; white-space: normal;
    overflow-wrap: break-word;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative;
    box-sizing: border-box;
    text-align: left;
  }
  .message.user .msg-bubble { background: var(--c-primary); color: #fff; border-bottom-right-radius: 4px; width: auto; max-width: 100%; }
  .message.ai .msg-bubble { background: #fff; color: var(--c-text); border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; width: 100%; }
  .msg-bubble { user-select: text; -webkit-user-select: text; -webkit-touch-callout: default; }
  .msg-delete {
    position: absolute; top: -8px; right: -8px;
    width: 22px; height: 22px; border-radius: 50%;
    background: #ef4444; border: 2px solid #fff; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1; opacity: 0; visibility: hidden;
    transition: opacity 0.2s, visibility 0.2s;
    z-index: 10; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .message:hover .msg-delete { opacity: 1; visibility: visible; }
  @media (hover: none) { .msg-delete { opacity: 1; visibility: visible; } }

  .katex-block { display: block; margin: 2px 0; padding: 0; text-align: center; line-height: 1.1; width: 100%; box-sizing: border-box; }
  .katex-block .katex { white-space: normal; }
  .katex-block .katex-display { margin: 0; overflow: hidden; }
  .katex-block .katex-display > .katex { white-space: normal; text-align: center; }

  .typing-indicator {
    display: inline-flex; gap: 4px; padding: 0 0 0 8px; vertical-align: middle;
  }
  .typing-dot {
    width: 6px; height: 6px; background: #8b5cf6; border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
  }
  .typing-dot:nth-child(1) { animation-delay: 0s; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .chat-input-area {
    padding: 16px 20px; background: #fff; border-top: 1px solid #e2e8f0;
    display: flex; gap: 10px; flex-shrink: 0;
  }
  .chat-input {
    flex: 1; padding: 12px 16px; border: 2px solid #e2e8f0;
    border-radius: 20px; font-size: 0.95rem; outline: none;
    transition: border-color 0.2s; resize: none; min-height: 44px;
    max-height: 120px; font-family: inherit;
  }
  .chat-input:focus { border-color: var(--c-primary); }
  .chat-send-btn {
    width: 44px; height: 44px; background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: #fff; border: none; border-radius: 50%; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform 0.2s;
  }
  .chat-send-btn:hover { transform: scale(1.05); }
  .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .chat-clear-btn {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    width: 32px; height: 32px; border-radius: 50%; font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; margin-right: 8px;
  }
  .chat-clear-btn:hover { background: rgba(255,255,255,0.3); }

  .chat-empty-tip {
    text-align: center; color: var(--c-muted); font-size: 0.9rem;
    padding: 40px 20px;
  }

  .chat-confirm-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 1100;
    display: none; justify-content: center; align-items: center;
    backdrop-filter: blur(4px);
  }
  .chat-confirm-overlay.show { display: flex; }
  .chat-confirm-modal {
    background: #fff; border-radius: 16px; padding: 24px;
    max-width: 300px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .chat-confirm-title { font-size: 1.1rem; font-weight: bold; color: var(--c-text); margin-bottom: 8px; }
  .chat-confirm-warn { color: #8b5cf6; font-weight: 500; font-size: 1.2rem; margin-bottom: 20px; }
  .chat-confirm-btns { display: flex; gap: 12px; justify-content: center; }
  .chat-confirm-cancel {
    padding: 10px 24px; border: 1px solid #e2e8f0; border-radius: 8px;
    background: #fff; color: var(--c-muted); font-size: 0.95rem; cursor: pointer;
  }
  .chat-confirm-cancel:hover { background: #f8fafc; }
  .chat-confirm-ok {
    padding: 10px 24px; border: none; border-radius: 8px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: #fff; font-size: 0.95rem; cursor: pointer;
  }
  .chat-confirm-ok:hover { opacity: 0.9; }

  /* AI 查公式按钮样式 */
  .cat-link.ai-link {
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: #fff; font-weight: bold; font-size: 0.95rem;
  }
  .cat-link.ai-link:hover {
    background: linear-gradient(135deg, #7c3aed, #db2777);
    transform: translateY(-2px);
  }

</style>
</head>
<body>
<div class="container">

  <!-- ============ 标题 ============ -->
  <div class="header">
    <h1>📚 奥数解题思路公式速查</h1>
    <p>按题型整理 · 公式 + 四步法 + 关键词 · 小朋友看得懂、记得住、用得上</p>
  </div>

  <!-- ============ 顶部导航 ============ -->
  <div class="topbar">
    <a href="index.html" class="btn-back" rel="noopener">← 返回首页</a>
    <a href="aoshu.html" class="btn-back" rel="noopener">← 返回题库</a>
  </div>

  <!-- ============ 目录 ============ -->
  <div class="cat-list" id="catList">
    <h2>📖 题型目录（共 <span id="totalTypes">0</span> 类）</h2>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- ============ 题型内容区 ============ -->
  <div id="content"></div>

  <div class="footer" id="footer">
    💡 提示：每一类题型下面都有 <b>核心公式</b> + <b>四步解题法</b> + <b>关键词判断</b>，先背公式，再按步骤来，奥数题就是"纸老虎"啦！
  </div>
</div>

<!-- ============ 悬浮按钮 ============ -->

  <div class="chat-modal">

<script>
// ============ 题型数据 ============
// 题型数据通过 fetch 异步加载，详见文件末尾 loadAndRender()
let TYPES = [];

// ============ 常量 & 工具 ============
const CHAT_EMPTY_TIP = '<div class="chat-empty-tip">👋 你好！我是你的奥数公式助手。<br>有什么题目需要我帮你查公式或解题吗？</div>';

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ============ 渲染 ============
function render() {
  const byCat = {};
  TYPES.forEach(function(t) {
    if (!byCat[t.cat]) byCat[t.cat] = [];
    byCat[t.cat].push(t);
  });

  // 目录
  const catGrid = document.getElementById("catGrid");
  let catHtml = '<a class="cat-link ai-link" href="javascript:void(0)" id="aiChatBtn" role="button">🤖 AI 查公式</a>';
  for (const cat in byCat) {
    catHtml += '<a class="cat-link" href="javascript:void(0)" data-target="cat-' + encodeURIComponent(cat) + '" role="button">' + escapeHtml(cat) + '<span class="count">(' + byCat[cat].length + ')</span></a>';
  }
  catGrid.innerHTML = catHtml;
  document.getElementById("totalTypes").textContent = TYPES.length;

  // 内容区
  const content = document.getElementById("content");
  let htmlOut = "";
  let typeIdx = 0;

  for (const cat in byCat) {
    const catId = "cat-" + encodeURIComponent(cat);
    htmlOut += '<div class="category" id="' + catId + '" data-cat="' + escapeHtml(cat) + '">';
    htmlOut += '<div class="category-title collapsed" data-target="' + catId + '">';
    htmlOut += '<span><span class="icon">📘</span>' + escapeHtml(cat) + '<span class="note">（' + byCat[cat].length + ' 类）</span></span>';
    htmlOut += '<span class="chevron">▼</span>';
    htmlOut += '</div>';

    byCat[cat].forEach(function(t) {
      const cardId = "t-" + (typeIdx++);
      const keywords = t.keywords || [];
      htmlOut += '<div class="card" id="' + cardId + '" data-name="' + escapeHtml(t.name) + '" data-keywords="' + escapeHtml(keywords.join(" ")) + '" data-cat="' + escapeHtml(t.cat) + '">';
      // 卡片头部
      htmlOut += '<div class="card-header">';
      htmlOut += '<span class="emoji">' + (t.emoji || "📌") + '</span>';
      htmlOut += '<h3>' + escapeHtml(t.name) + '</h3>';
      htmlOut += '<span class="keywords">';
      keywords.forEach(function(k) { htmlOut += '<span class="tag">' + escapeHtml(k) + '</span>'; });
      htmlOut += '</span>';
      htmlOut += '<span class="chevron">▼</span>';
      htmlOut += '</div>';
      // 卡片内容体
      htmlOut += '<div class="card-body">';
      // 小提示+公式（左列）| 解题四步法（右列）
      if (t.note || t.formula || (t.steps && t.steps.length)) {
        htmlOut += '<div class="mid-grid">';
        // 左列：小提示 + 公式
        if (t.note || t.formula) {
          htmlOut += '<div class="formula-col">';
          if (t.note) {
            htmlOut += '<div class="note-box"><strong>💡 小提示</strong>' + escapeHtml(t.note) + '</div>';
          }
          if (t.formula) {
            htmlOut += '<div class="formula">' + escapeHtml(t.formula) + '</div>';
          }
          htmlOut += '</div>';
        } else {
          htmlOut += '<div></div>';
        }
        // 右列：解题四步法
        if (t.steps && t.steps.length) {
          htmlOut += '<div class="steps"><h4>🪜 解题四步法</h4><ol>';
          t.steps.forEach(function(s) { htmlOut += '<li>' + escapeHtml(s) + '</li>'; });
          htmlOut += '</ol></div>';
        } else {
          htmlOut += '<div></div>';
        }
        htmlOut += '</div>';
      }
      // 典型例题
      if (t.examples && t.examples.length) {
        htmlOut += '<div class="examples-grid">';
        t.examples.forEach(function(e) {
          htmlOut += '<div class="example"><div class="example-title">📝 典型例题</div>' + escapeHtml(e) + '</div>';
        });
        htmlOut += '</div>';
      }
      htmlOut += '</div></div>';
    });
    htmlOut += '</div>';
  }
  content.innerHTML = htmlOut;

  // ===== 事件委托：卡片折叠 =====
  content.addEventListener("click", function(e) {
    const header = e.target.closest(".card-header");
    if (header) {
      header.closest(".card").classList.toggle("expanded");
      return;
    }
    const catTitle = e.target.closest(".category-title");
    if (catTitle) {
      e.stopPropagation();
      const targetId = catTitle.getAttribute("data-target");
      const catDiv = document.getElementById(targetId);
      if (!catDiv) return;
      toggleCategory(catDiv, catTitle);
    }
  });

  // ===== 目录链接点击（事件委托） =====
  catGrid.addEventListener("click", function(e) {
    const link = e.target.closest(".cat-link[data-target]");
    if (!link) return;
    const targetId = link.getAttribute("data-target");
    const target = document.getElementById(targetId);
    if (!target) return;
    showCategory(target);
  });
}

// ============ 类别显隐控制 ============
function resetAllCategories() {
  document.querySelectorAll(".category").forEach(function(cat) {
    cat.classList.remove("active");
    cat.querySelectorAll(".card").forEach(function(c) { c.classList.remove("expanded"); });
    const title = cat.querySelector(".category-title");
    if (title) title.classList.add("collapsed");
  });
}

function showCategory(catDiv) {
  resetAllCategories();
  catDiv.classList.add("active");
  const title = catDiv.querySelector(".category-title");
  if (title) title.classList.remove("collapsed");
  catDiv.scrollIntoView({ behavior: "smooth", block: "start" });
}

function toggleCategory(catDiv, title) {
  const isActive = catDiv.classList.contains("active");
  resetAllCategories();
  if (!isActive) {
    catDiv.classList.add("active");
    title.classList.remove("collapsed");
    catDiv.scrollIntoView({ behavior: "smooth", block: "start" });
  } else {
    title.classList.add("collapsed");
    const catList = document.getElementById("catList");
    if (catList) catList.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

// ============ 顶部按钮 ============
function setupTopBtn() {
  const btn = document.getElementById("topBtn");
  if (!btn) return;
  btn.addEventListener("click", function() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
}

// ============ AI 聊天功能 ============
function setupChat() {
  const chatModalOverlay = document.getElementById("chatModalOverlay");
  const chatCloseBtn = document.getElementById("chatCloseBtn");
  const aiChatBtn = document.getElementById("aiChatBtn");
  const chatMessages = document.getElementById("chatMessages");
  const chatInput = document.getElementById("chatInput");
  const chatSendBtn = document.getElementById("chatSendBtn");
  const chatClearBtn = document.getElementById("chatClearBtn");
  const chatConfirmOverlay = document.getElementById("chatConfirmOverlay");
  const chatConfirmCancel = document.getElementById("chatConfirmCancel");
  const chatConfirmOk = document.getElementById("chatConfirmOk");

  // 配置
  const API_BASE_URL = "https://apihub.agnes-ai.com/v1";
  const _C = ["c2stbHI0czc=","RTdlaVFZVWU=","QzRUNDd4Tm8=","UWNpT2FwcUE=","SU9GUGtUTGc=","dnRkOGFlN3k=","Nm5a"];
  const API_KEY = _C.map(function(s) { return atob(s); }).join("");
  const CHAT_STORAGE_KEY = "ai_chat_history";
  const AI_MODEL = "agnes-2.0-flash";
  const SYSTEM_PROMPT = "你是一个专业的奥数辅导助手。请用中文回答，给出解题思路和公式，并提供简单的例子。保持回答简洁明了，适合小学生理解。\n\n【极其重要：输出格式严格要求】\n1. 所有数学符号必须使用 LaTeX 语法并用美元符号包裹：\n   - 行内小公式：用 $...$ 包裹，例如 $\\sqrt{4}$、$\\frac{1}{2}$、$x^2$、$a^2+b^2=c^2$\n   - 独占一行的大公式：用 $$...$$ 包裹，例如 $$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$\n2. 根号写法：$\\sqrt{4}$ 而不是根号4或√4\n3. 分数写法：$\\frac{1}{2}$ 而不是 1/2\n4. 平方写法：$x^2$ 而不是 x²\n5. 公式中涉及的所有数字、字母变量必须放在 $...$ 中\n6. 每讲解一个概念后，至少给出一个包含完整公式的例子\n7. 使用 Markdown 格式组织内容（# 标题，**加粗**，- 列表等）\n8. 严格禁止任何自我介绍，直接给出答案";

  // 待删除消息（闭包变量，替代 window 全局）
  let pendingDeleteMsg = null;
  let abortController = null;

  // ===== 工具函数 =====
  function optimizeLineBreak(text) {
    return text.replace(/([，。！？、；：）】])/g, "$1&#8203;");
  }

  function fixLatex(text) {
    return text
      .replace(/\\sqrt\{(\d+)\}\{([^}]+)\}/g, "\\sqrt[$1]{$2}")
      .replace(/\\sqrt(\d+)/g, "\\sqrt{$1}");
  }

  function renderContent(text) {
    const fixed = fixLatex(text);
    const parts = [];
    let lastEnd = 0;
    const regex = /\$\$?([^$]+)\$\$?/g;
    let match;
    while ((match = regex.exec(fixed)) !== null) {
      if (match.index > lastEnd) {
        parts.push({ type: "text", content: fixed.substring(lastEnd, match.index) });
      }
      const isBlock = match[0].startsWith("$$");
      parts.push({ type: isBlock ? "block" : "inline", content: match[1] });
      lastEnd = match.index + match[0].length;
    }
    if (lastEnd < fixed.length) {
      parts.push({ type: "text", content: fixed.substring(lastEnd) });
    }

    let result = "";
    for (let i = 0; i < parts.length; i++) {
      const p = parts[i];
      if (p.type === "text") {
        let txt = p.content
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "$1")
          .replace(/^#{1,6}\s*/gm, "")
          .replace(/^[-*]\s+/gm, "• ")
          .replace(/^(\d+\.\s+)/gm, "<br>$1")
          .replace(/\n\n/g, "<br><br>")
          .replace(/\n/g, " ");
        result += optimizeLineBreak(txt);
      } else {
        try {
          if (typeof katex === "undefined") {
            result += escapeHtml(p.content);
          } else {
            const html = katex.renderToString(p.content, { throwOnError: false, displayMode: p.type === "block" });
            if (p.type === "block") {
              result += '<div class="katex-block">' + html + '</div>';
            } else {
              result += html;
            }
          }
        } catch (e) {
          result += escapeHtml(p.content);
        }
      }
    }
    return result;
  }

  // ===== 长公式自动缩小字体 =====
  function autoScaleKatex(container) {
    if (!container) return;
    const blocks = container.querySelectorAll(".katex-block");
    blocks.forEach(function(block) {
      block.style.fontSize = '';
      const parentWidth = block.clientWidth || block.parentElement.clientWidth || 300;
      const scales = [1, 0.85, 0.72, 0.6, 0.5];
      for (let i = 0; i < scales.length; i++) {
        block.style.fontSize = (0.9 * scales[i]) + "rem";
        const el = block.querySelector(".katex-display") || block.querySelector(".katex");
        if (!el || el.scrollWidth <= parentWidth + 2) break;
      }
    });
  }

  // ===== 弹窗控制 =====
  function openChat() {
    loadChatHistory();
    document.body.classList.add("chat-open");
    chatModalOverlay.classList.add("show");
    setTimeout(scrollToBottom, 50);
  }

  function closeChat() {
    document.body.classList.remove("chat-open");
    chatModalOverlay.classList.remove("show");
    if (abortController) { abortController.abort(); abortController = null; }
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // ===== 聊天记录持久化 =====
  function saveChatHistory() {
    const messages = [];
    const msgDivs = chatMessages.querySelectorAll(".message");
    msgDivs.forEach(function(div) {
      const bubble = div.querySelector(".msg-bubble");
      messages.push({
        isUser: div.classList.contains("user"),
        text: bubble.dataset.original || bubble.textContent
      });
    });
    try {
      localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(messages));
    } catch(e) { console.warn("saveChatHistory error:", e); }
  }

  function loadChatHistory() {
    try {
      const data = localStorage.getItem(CHAT_STORAGE_KEY);
      if (!data) return;
      const messages = JSON.parse(data);
      chatMessages.innerHTML = '';
      if (messages.length === 0) {
        chatMessages.innerHTML = CHAT_EMPTY_TIP;
        return;
      }
      messages.forEach(function(msg) {
        if (!msg.text || !msg.text.trim()) return;
        const cleanText = msg.text.replace(/^×\s*/, '').replace(/\s*×$/, '');
        const div = document.createElement("div");
        div.className = "message " + (msg.isUser ? "user" : "ai");
        const bubbleHtml = msg.isUser ? optimizeLineBreak(escapeHtml(cleanText)) : renderContent(cleanText);
        div.innerHTML = '<div class="msg-bubble">' + bubbleHtml + '<button class="msg-delete" title="删除">×</button></div>';
        const bubble = div.querySelector(".msg-bubble");
        bubble.dataset.original = cleanText;
        div.querySelector(".msg-delete").addEventListener("click", function() { deleteMessage(div); });
        chatMessages.appendChild(div);
        if (!msg.isUser) autoScaleKatex(bubble);
      });
      scrollToBottom();
    } catch(e) { console.warn("loadChatHistory error:", e); }
  }

  // ===== 删除消息 =====
  function deleteMessage(msgDiv) {
    pendingDeleteMsg = msgDiv;
    document.getElementById("chatConfirmTitle").textContent = "确认删除这条消息？";
    document.getElementById("chatConfirmWarn").textContent = "删除后无法恢复";
    chatConfirmOverlay.classList.add("show");
  }

  // ===== 输入框自适应 =====
  function updateInputHeight() {
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
  }

  // ===== 发送消息 =====
  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = "";
    chatInput.style.height = "auto";
    chatSendBtn.disabled = true;

    const emptyTip = chatMessages.querySelector(".chat-empty-tip");
    if (emptyTip) emptyTip.remove();

    // 用户消息
    const userMsgDiv = document.createElement("div");
    userMsgDiv.className = "message user";
    userMsgDiv.innerHTML = '<div class="msg-bubble">' + optimizeLineBreak(escapeHtml(text)) + '<button class="msg-delete" title="删除">×</button></div>';
    const userBubble = userMsgDiv.querySelector(".msg-bubble");
    userBubble.dataset.original = text;
    userMsgDiv.querySelector(".msg-delete").addEventListener("click", function() { deleteMessage(userMsgDiv); });
    chatMessages.appendChild(userMsgDiv);
    scrollToBottom();

    // AI 消息（typing indicator）
    const aiMsgDiv = document.createElement("div");
    aiMsgDiv.className = "message ai";
    aiMsgDiv.innerHTML = '<div class="msg-bubble">正在思考<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    chatMessages.appendChild(aiMsgDiv);
    const bubble = aiMsgDiv.querySelector(".msg-bubble");
    scrollToBottom();

    // ===== 构建带上下文的 messages =====
    const historyMessages = [{ role: "system", content: SYSTEM_PROMPT }];
    chatMessages.querySelectorAll(".message").forEach(function(div) {
      const bubble = div.querySelector(".msg-bubble");
      if (!bubble || !bubble.dataset.original) return;
      historyMessages.push({
        role: div.classList.contains("user") ? "user" : "assistant",
        content: bubble.dataset.original
      });
    });

    // ===== API 请求（带重试） =====
    const MAX_RETRIES = 2;
    let retryCount = 0;
    let response = null;

    abortController = new AbortController();

    while (retryCount <= MAX_RETRIES) {
      try {
        response = await fetch(API_BASE_URL + "/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
          },
          signal: abortController.signal,
          body: JSON.stringify({
            model: AI_MODEL,
            messages: historyMessages,
            temperature: 0.3,
            max_tokens: 2048,
            stream: true
          })
        });

        if (response.ok) break;

        const errorText = await response.text();
        if (response.status >= 500 && response.status < 600 && retryCount < MAX_RETRIES) {
          retryCount++;
          await new Promise(function(resolve) { setTimeout(resolve, 1000 * retryCount); });
          continue;
        }
        throw new Error("API 请求失败：" + response.status + " " + errorText);

      } catch(err) {
        if (retryCount < MAX_RETRIES) {
          retryCount++;
          await new Promise(function(resolve) { setTimeout(resolve, 1000 * retryCount); });
          continue;
        }
        throw err;
      }
    }

    // ===== 流式读取 =====
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullContent = "";
    let renderedHtml = "";
    let lastRenderedLength = 0;
    let renderTimeout = null;

    function doRender() {
      const incompletePart = fullContent.substring(lastRenderedLength);
      bubble.innerHTML = renderedHtml + escapeHtml(incompletePart);
      scrollToBottom();
      renderTimeout = null;
    }

    while (true) {
      const result = await reader.read();
      if (result.done) break;

      const chunk = decoder.decode(result.value, { stream: true });
      const lines = chunk.split("\n");

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line === "" || line === "data: [DONE]") continue;
        if (line.startsWith("data: ")) {
          try {
            const jsonStr = line.slice(6);
            const data = JSON.parse(jsonStr);
            if (data.choices && data.choices[0] && data.choices[0].delta && data.choices[0].delta.content) {
              if (fullContent.length === 0) {
                bubble.innerHTML = '';
              }
              fullContent += data.choices[0].delta.content;

              const lastNewlineIndex = fullContent.lastIndexOf('\n');
              if (lastNewlineIndex > lastRenderedLength) {
                const newContent = fullContent.substring(lastRenderedLength, lastNewlineIndex);
                renderedHtml += renderContent(newContent);
                lastRenderedLength = lastNewlineIndex;
              }

              if (renderTimeout) clearTimeout(renderTimeout);
              renderTimeout = setTimeout(doRender, 30);
            }
          } catch (e) { /* partial JSON, will retry on next chunk */ }
        }
      }
    }

    // ===== 最终渲染 =====
    try {
      if (!fullContent) {
        throw new Error("未收到有效响应");
      }

      if (renderTimeout) clearTimeout(renderTimeout);

      const remainingContent = fullContent.substring(lastRenderedLength);
      if (remainingContent) {
        renderedHtml += renderContent(remainingContent);
      }
      bubble.innerHTML = renderedHtml + '<button class="msg-delete" title="删除">×</button>';
      bubble.dataset.original = fullContent;
      autoScaleKatex(bubble);
      bubble.querySelector(".msg-delete").addEventListener("click", function() { deleteMessage(aiMsgDiv); });
      scrollToBottom();
      saveChatHistory();
    } catch (error) {
      bubble.innerHTML = renderContent("❌ 出错了：" + error.message) + '<button class="msg-delete" title="删除">×</button>';
      bubble.querySelector(".msg-delete").addEventListener("click", function() { deleteMessage(aiMsgDiv); });
      console.error(error);
    } finally {
      chatSendBtn.disabled = false;
    }
  }

  // ===== 防止滑动穿透 =====
  let startY = 0;
  chatModalOverlay.addEventListener("touchstart", function(e) {
    startY = e.touches[0].clientY;
  }, { passive: false });

  chatModalOverlay.addEventListener("touchmove", function(e) {
    if (!chatMessages.contains(e.target)) {
      e.preventDefault();
      return;
    }
    const currentY = e.touches[0].clientY;
    const deltaY = currentY - startY;
    if (deltaY > 0 && chatMessages.scrollTop <= 0) {
      e.preventDefault();
      return;
    }
    if (deltaY < 0 && chatMessages.scrollTop + chatMessages.clientHeight >= chatMessages.scrollHeight) {
      e.preventDefault();
      return;
    }
  }, { passive: false });

  // ===== 事件绑定 =====
  if (aiChatBtn) {
    aiChatBtn.addEventListener("click", openChat);
  }
  //setTimeout(openChat, 100);

  if (chatCloseBtn) {
    chatCloseBtn.addEventListener("click", closeChat);
  }

  // Esc 键关闭弹窗
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      if (chatConfirmOverlay.classList.contains("show")) {
        chatConfirmOverlay.classList.remove("show");
      } else if (chatModalOverlay.classList.contains("show")) {
        closeChat();
      }
    }
  });

  // 清空记录
  if (chatClearBtn) {
    chatClearBtn.addEventListener("click", function() {
      pendingDeleteMsg = null;
      document.getElementById("chatConfirmTitle").textContent = "确认清空聊天记录？";
      document.getElementById("chatConfirmWarn").textContent = "此操作不可恢复";
      if (chatConfirmOverlay) chatConfirmOverlay.classList.add("show");
    });
  }

  if (chatConfirmCancel) {
    chatConfirmCancel.addEventListener("click", function() {
      if (chatConfirmOverlay) chatConfirmOverlay.classList.remove("show");
    });
  }

  if (chatConfirmOk) {
    chatConfirmOk.addEventListener("click", function() {
      if (pendingDeleteMsg) {
        // 删除单条消息
        pendingDeleteMsg.remove();
        pendingDeleteMsg = null;
        saveChatHistory();
        const msgCount = chatMessages.querySelectorAll(".message").length;
        const emptyTip = chatMessages.querySelector(".chat-empty-tip");
        if (msgCount === 0 && !emptyTip) {
          chatMessages.innerHTML = CHAT_EMPTY_TIP;
        }
      } else {
        // 清空全部
        localStorage.removeItem(CHAT_STORAGE_KEY);
        chatMessages.innerHTML = CHAT_EMPTY_TIP;
      }
      if (chatConfirmOverlay) chatConfirmOverlay.classList.remove("show");
    });
  }

  if (chatConfirmOverlay) {
    chatConfirmOverlay.addEventListener("click", function(e) {
      if (e.target === chatConfirmOverlay) {
        chatConfirmOverlay.classList.remove("show");
      }
    });
  }

  if (chatModalOverlay) {
    chatModalOverlay.addEventListener("click", function(e) {
      if (e.target === chatModalOverlay) closeChat();
    });
  }

  if (chatInput) {
    chatInput.addEventListener("input", updateInputHeight);
    chatInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }

  if (chatSendBtn) {
    chatSendBtn.addEventListener("click", sendMessage);
  }
}

// ============ 启动 ============
// 异步加载题型数据 JSON，加载完成后再渲染
function loadAndRender() {
  fetch("formulas.json")
    .then(res => {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(data => {
      TYPES = data;
      render();
      setupTopBtn();
      setupChat();
    })
    .catch(err => {
      console.error("题型数据加载失败：", err);
      const content = document.getElementById("content");
      if (content) {
        content.innerHTML =
          '<div style="padding:24px;text-align:center;color:#b91c1c;">' +
          '⚠️ 公式数据加载失败，请通过 HTTP 方式访问本页面（例如 <code>python3 -m http.server</code>），' +
          '并确认 formulas.json 与 silu.html 位于同一目录。</div>';
      }
    });
}
loadAndRender();

</script>
