name: CI

on:
  push:
    branches: [main, module]
  pull_request:
    branches: [main, module]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chem-lab

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: chem-lab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    if: github.ref == 'refs/heads/module'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: chem-lab/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: chem-lab

      - name: Build
        run: npm run build
        working-directory: chem-lab

      - name: Move build output to chem/
        run: |
          rm -rf chem
          mkdir -p chem
          cp -r chem-lab/dist/* chem/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: chem

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
